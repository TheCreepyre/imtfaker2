name: Build and Release v4

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0
    branches:
      - main  # Also trigger on main branch pushes

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install MinGW-w64
      run: |
        choco install mingw -y --no-progress
        echo "C:\tools\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

    - name: Compile hidden console version
      run: |
        g++ -o ProcessKiller.exe ProcessKiller.cpp -static -Os -lstdc++ -lkernel32 -luser32 -ladvapi32 -mwindows

    - name: Rename artifact for clarity
      run: |
        move ProcessKiller.exe ProcessKiller_Hidden.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ProcessKiller_Hidden
        path: ProcessKiller_Hidden.exe
        retention-days: 30

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: ProcessKiller_Hidden

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: ProcessKiller_Hidden.exe
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
