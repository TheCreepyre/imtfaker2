name: Build and Release

on:
  push:
    tags:
      - 'v4.0*'  # Trigger on version tags like v1.0
    branches:
      - main  # Also trigger on main branch pushes

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install MinGW-w64
      run: |
        choco install mingw -y
        refreshenv

    - name: Compile the program
      run: |
        g++ -o ProcessKiller.exe ProcessKiller.cpp -static -Os -lstdc++ -lkernel32 -luser32 -ladvapi32

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ProcessKiller
        path: ProcessKiller.exe

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: ProcessKiller

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ProcessKiller.exe
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
