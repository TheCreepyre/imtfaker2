name: Build Process Killer EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller psutil keyboard

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name ProcessKiller --exclude-module _tkinter --exclude-module tkinter kill_processes.py

      - name: Install UPX
        run: |
          choco install upx -y --no-progress --force

      - name: Compress EXE with UPX
        run: |
          $exePath = "dist/ProcessKiller.exe"
          if (Test-Path $exePath) {
            upx --best --ultra-brute $exePath -o $exePath.compressed
            Remove-Item $exePath -Force
            Rename-Item $exePath.compressed $exePath -Force
          } else {
            Write-Host "EXE file not found at $exePath"
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProcessKiller-EXE
          path: dist/ProcessKiller.exe

      - name: Upload lock file template
        uses: actions/upload-artifact@v4
        with:
          name: LockFile
          path: |
            process_killer.lock
            !dist/
