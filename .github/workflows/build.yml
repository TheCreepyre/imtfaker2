name: Build Malware Process Killer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller psutil

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --icon=app.ico --name "MalwareProcessKiller" malware_killer.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MalwareProcessKiller
        path: dist/MalwareProcessKiller.exe
