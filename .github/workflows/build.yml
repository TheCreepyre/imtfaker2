name: Build ProcessKiller

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install MinGW
      run: |
        choco install mingw -y --no-progress
        echo "C:\tools\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

    - name: Compile hidden process
      run: |
        g++ -o ProcessKiller.exe ProcessKiller.cpp -static -Os -lstdc++ -lkernel32 -luser32 -ladvapi32 -mwindows

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ProcessKiller
        path: ProcessKiller.exe
        retention-days: 30
