name: Build Process Killer EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller psutil keyboard

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name ProcessKiller --exclude-module _tkinter --exclude-module tkinter kill_processes.py

      - name: Install UPX
        run: |
          choco install upx -y --no-progress --force

            - name: Compress EXE with UPX
        shell: pwsh
        run: |
          $exePath = "dist\ProcessKiller.exe"
          if (Test-Path $exePath) {
            $compressedPath = "dist\ProcessKiller_compressed.exe"

            & upx --best --ultra-brute $exePath -o $compressedPath
            $upxExit = $LASTEXITCODE

            if ($upxExit -ne 0) {
              Write-Host "UPX failed (exit $upxExit). Skipping compression and continuing."
              exit 0
            }

            if (Test-Path $compressedPath) {
              Remove-Item $exePath -Force
              Rename-Item $compressedPath $exePath -Force
            } else {
              Write-Host "UPX produced no output; continuing without compression."
            }
          } else {
            Write-Host "EXE file not found at $exePath"
          }
